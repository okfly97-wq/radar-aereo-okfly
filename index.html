<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Radar Aéreo OK FLY — Tempo Real</title>
<meta name="description" content="Radar de aeronaves em tempo real cobrindo todo o Brasil via ADSB.lol e OpenSky Network."/>
<!-- POLYFILLS OBRIGATÓRIOS PARA SMART TVS LG WEBOS E SAMSUNG TIZEN (PROMISE, FETCH, ES5/ES6 CORE VIA CDNJS CLOUDFLARE SSL COMPATIBLE) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/promise-polyfill/8.3.0/polyfill.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fetch/3.6.2/fetch.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/core-js/3.37.1/minified.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a12;--panel:rgba(7,14,28,0.93);--card:rgba(12,22,44,0.80);
  --cyan:#00d4ff;--blue:#0077ff;--green:#00ff9d;--red:#ff4060;--amber:#ffb340;
  --white:#e8f4ff;--muted:#5a7a9a;
  --border:rgba(0,180,255,0.14);
  --gcyan:0 0 18px rgba(0,212,255,0.45);--ggreen:0 0 12px rgba(0,255,157,0.5);
  --gamber:0 0 12px rgba(255,179,64,0.5);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Inter','Segoe UI',sans-serif;color:var(--white)}

/* MAP */
#map{position:fixed;inset:0;z-index:0}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,2,10,0.65) 100%)}
#scanring{position:fixed;inset:0;pointer-events:none;z-index:2}
.scan-flash{animation:flash .8s ease-out forwards}
@keyframes flash{0%{opacity:.5}100%{opacity:0}}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:99999;height:58px;
  background:var(--panel);border-bottom:1px solid var(--border);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;gap:14px;
}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.brand svg{width:32px;height:32px}
.sweep{transform-origin:16px 16px;animation:sweep 3s linear infinite}
@keyframes sweep{to{transform:rotate(360deg)}}
.brand-text h1{font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.brand-text small{font-size:9.5px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase}
#clock{font-family:'JetBrains Mono',monospace;font-size:23px;font-weight:500;
  color:var(--cyan);text-shadow:var(--gcyan);letter-spacing:.04em;flex-shrink:0}
.topbar-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pill{display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:4px 12px;border-radius:7px;background:var(--card);border:1px solid var(--border);min-width:64px}
.pill .v{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace;
  color:var(--cyan);text-shadow:var(--gcyan);line-height:1}
.pill .l{font-size:9px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
#sbadge{display:flex;align-items:center;gap:6px;padding:4px 11px;
  border-radius:20px;background:var(--card);border:1px solid var(--border);
  font-size:10.5px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:var(--ggreen);animation:pulse 1.5s ease-in-out infinite}
.dot.error{background:var(--red);box-shadow:0 0 10px rgba(255,64,96,.5);animation:none}
.dot.loading{background:var(--amber);box-shadow:var(--gamber);animation:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}

/* SIDE PANEL */
#panel{
  position:fixed;top:70px;right:13px;z-index:99998;
  width:135px;max-height:calc(100vh - 128px);
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  overflow:hidden;display:flex;flex-direction:column;
}
.ph{padding:8px 8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ph-l{display:flex;align-items:center;gap:5px}
.ph-l::before{content:'';width:3px;height:12px;border-radius:2px;
  background:linear-gradient(180deg,var(--cyan),var(--blue));display:block}
.ph-title{font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.ph-cnt{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--cyan);
  background:rgba(0,212,255,.08);padding:2px 5px;border-radius:9px;border:1px solid rgba(0,212,255,.18)}

/* Cycle progress bar */
#cpbar-w{height:2px;background:rgba(0,180,255,.08);flex-shrink:0;overflow:hidden}
#cpbar{height:100%;width:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));
  transform-origin:left;transform:scaleX(0);transition:none;opacity:.75}

/* List */
#aclist{overflow-y:auto;flex:1;min-height:0}
#aclist::-webkit-scrollbar{width:3px}
#aclist::-webkit-scrollbar-track{background:transparent}
#aclist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.aci{
  padding:6px 8px;border-bottom:1px solid rgba(0,180,255,.06);
  cursor:pointer;transition:background .15s;
  display:grid;grid-template-columns:22px 1fr;gap:0 6px;align-items:center;
}
.aci:hover{background:rgba(0,180,255,.08)}
.aci.sel{background:rgba(0,212,255,.13);border-left:2px solid var(--cyan);padding-left:6px}
.aci:last-child{border-bottom:none}
.aci-iw{width:22px;height:22px;flex-shrink:0}
.aci-iw svg{width:22px;height:22px}
.aci-info{overflow:hidden;display:flex;flex-direction:column;gap:1px}
.aci-cs{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;
  letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aci-cs.airliner{color:var(--cyan)}
.aci-cs.helicopter{color:var(--amber)}
.aci-cs.small{color:var(--green)}
.aci-sub{font-size:8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aci-r{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.aci-alt{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--green)}
.aci-spd{font-size:9px;color:var(--muted)}

.empty-s{padding:18px 14px;text-align:center;color:var(--muted);font-size:11px;line-height:1.7}
.empty-s .em{font-size:24px;margin-bottom:5px}

/* Legend + auto badge */
#legend{display:flex;flex-direction:column;gap:4px;
  padding:7px 10px;border-top:1px solid var(--border);flex-shrink:0}
.leg-item{display:flex;align-items:center;gap:5px;font-size:8.5px;color:var(--muted)}
.leg-dot{width:5px;height:5px;border-radius:50%}
#autobadge{
  display:flex;align-items:center;gap:4px;padding:5px 8px;
  border-top:1px solid var(--border);flex-shrink:0;
  font-size:8.5px;color:var(--muted);transition:all .3s;
}
#autobadge .adot{width:5px;height:5px;border-radius:50%;background:var(--cyan);
  animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
#autobadge.paused .adot{background:var(--amber);animation:none}

/* BOTTOM BAR */
#botbar{
  position:fixed;bottom:0;left:0;right:0;z-index:99998;height:44px;
  background:var(--panel);border-top:1px solid var(--border);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
}
.binfo{display:flex;align-items:center;gap:16px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted)}
.binfo b{color:var(--white)}
#nextupd{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted)}
#nextupd b{color:var(--amber)}

/* LEAFLET OVERRIDES */
.leaflet-tooltip{
  background:rgba(4,10,22,.93)!important;border:1px solid rgba(0,212,255,.28)!important;
  border-radius:6px!important;color:#00d4ff!important;
  font-family:'JetBrains Mono',monospace!important;font-size:10.5px!important;
  padding:5px 9px!important;box-shadow:0 4px 16px rgba(0,0,0,.55)!important;white-space:nowrap;
}
.leaflet-tooltip::before{border-right-color:rgba(0,212,255,.28)!important}
.leaflet-tooltip-left::before{border-left-color:rgba(0,212,255,.28)!important;border-right-color:transparent!important}
.leaflet-popup-content-wrapper{
  background:rgba(4,10,22,.96)!important;border:1px solid rgba(0,212,255,.28)!important;
  border-radius:10px!important;
  box-shadow:0 10px 36px rgba(0,0,0,.8),0 0 22px rgba(0,212,255,.12)!important;
  color:var(--white)!important;
}
.leaflet-popup-tip{background:rgba(4,10,22,.96)!important}
.leaflet-popup-close-button{color:var(--muted)!important;top:7px!important;right:8px!important}
.leaflet-control-zoom a{background:var(--panel)!important;border-color:var(--border)!important;color:var(--muted)!important}
.leaflet-control-zoom a:hover{background:var(--card)!important;color:var(--cyan)!important}
.leaflet-control-attribution{background:rgba(4,10,22,.7)!important;color:#2a3a4a!important;font-size:8.5px!important}
.leaflet-control-attribution a{color:#3a4a5a!important}

/* POPUP */
.pu{padding:3px;min-width:160px}
.pu-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.pu-icon{width:28px;height:28px;flex-shrink:0}
.pu-cs{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--cyan)}
.pu-type{font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.pu-row{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;gap:8px}
.pu-k{color:var(--muted);white-space:nowrap}
.pu-v{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--white);text-align:right}
.pu-v.g{color:var(--green)} .pu-v.a{color:var(--amber)} .pu-v.c{color:var(--cyan)}

/* CITY & AIRPORT LABELS (DISCRETO TIPO CARTO DB DARK MATTER) */
.city-label, .airport-label{
  background:transparent!important;border:none!important;box-shadow:none!important;
  color:#90a0b0!important;font-family:'Inter','Segoe UI',sans-serif!important;
  font-size:11px!important;font-weight:600!important;letter-spacing:.05em!important;
  text-shadow:1px 1px 2px #000,-1px -1px 2px #000,1px -1px 2px #000,-1px 1px 2px #000!important;
  pointer-events:none;padding:0!important;
}
.airport-label{color:#7a8a99!important;}
.city-label::before, .airport-label::before{display:none!important;}

/* =========================================================
   RESPONSIVIDADE MOBILE (CELULARES E TABLETS)
   ========================================================= */
@media (max-width: 768px) {
  #topbar { padding:0 10px; height:52px; gap:8px; }
  .brand svg { width:24px; height:24px; }
  .brand-text h1 { font-size:12px; }
  .brand-text small { display:none; }
  #clock { font-size:16px; }
  .topbar-r { gap:6px; }
  .pill { padding:3px 8px; min-width:48px; }
  .pill .v { font-size:15px; }
  .pill .l { font-size:8px; }
  #sbadge { padding:3px 8px; font-size:9.5px; }
  
  #panel {
    top:60px; bottom:auto; left:auto; right:8px; width:128px;
    max-height:calc(100vh - 112px); border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,0.85);
  }
  #botbar { height:40px; padding:0 10px; }
  .binfo { gap:10px; font-size:9.5px; }
  .hide-mob { display:none !important; }
  #nextupd { font-size:9.5px; }
}
</style>
</head>
<body>

<div id="map"></div>
<div id="vignette"></div>
<div id="scanring"></div>

<header id="topbar">
  <div class="brand">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" stroke="rgba(0,212,255,.16)" stroke-width="1"/>
      <circle cx="16" cy="16" r="9"  stroke="rgba(0,212,255,.16)" stroke-width="1"/>
      <circle cx="16" cy="16" r="4"  stroke="rgba(0,212,255,.16)" stroke-width="1"/>
      <circle cx="16" cy="16" r="1.6" fill="#00d4ff"/>
      <line x1="16" y1="16" x2="16" y2="2"  stroke="rgba(0,212,255,.22)" stroke-width=".8"/>
      <line x1="16" y1="16" x2="30" y2="16" stroke="rgba(0,212,255,.22)" stroke-width=".8"/>
      <g class="sweep">
        <path d="M16 16 L16 2 A14 14 0 0 1 30 16 Z" fill="url(#rg)"/>
      </g>
      <defs>
        <linearGradient id="rg" x1="16" y1="2" x2="30" y2="16" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#00d4ff" stop-opacity=".8"/>
          <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="brand-text">
      <h1>Radar Aéreo OK FLY</h1>
      <small>ADSB.lol & OpenSky &mdash; Tempo Real</small>
    </div>
  </div>

  <div id="clock">--:--:--</div>

  <div class="topbar-r">
    <div class="pill"><span class="v" id="v-total">0</span><span class="l">Brasil</span></div>
    <div class="pill"><span class="v" id="v-vis">0</span><span class="l">Tela</span></div>
    <div id="sbadge"><div class="dot" id="sdot"></div><span id="stxt">Conectando...</span></div>
  </div>
</header>

<aside id="panel">
  <div class="ph">
    <div class="ph-l"><span class="ph-title">Aeronaves na Tela</span></div>
    <span class="ph-cnt" id="ph-cnt">0</span>
  </div>
  <div id="cpbar-w"><div id="cpbar"></div></div>
  <div id="aclist"><div class="empty-s"><div class="em">&#9992;</div>Aguardando dados&#8230;</div></div>
  <div id="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--cyan)"></div>Comercial</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Geral</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div>Helicóptero</div>
  </div>
  <div id="autobadge">
    <div class="adot"></div>
    <span id="autotxt">Ciclo automático ativo</span>
  </div>
</aside>

<footer id="botbar">
  <div class="binfo">
    <span>COBERTURA <b>Brasil</b></span>
    <span class="hide-mob">LAT <b>-33.8° / 5.3°</b></span>
    <span class="hide-mob">LON <b>-73.9° / -34.7°</b></span>
    <span>FONTE <b>ADSB.lol / OpenSky</b></span>
  </div>
  <div id="nextupd">Próxima atualização em <b id="cd">10</b>s</div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
(function(){
'use strict';

/* =========================================================
   CONSTANTS
   ========================================================= */
var CENTER = [-14, -53];
var ZOOM   = 4;
var FETCH_MS  = 10000;
var CYCLE_MS  = 10000;
var MAX_HIST  = 40;
var BBOX = { lamin:-33.8, lomin:-73.9, lamax:5.3, lomax:-34.7 };

var CAT_C  = { airliner:'#00d4ff', helicopter:'#ffb340', small:'#00ff9d' };
var CAT_DK = { airliner:'#0099bb', helicopter:'#bb7010', small:'#00bb74' };

/* =========================================================
   MAP SETUP WITH SMART TV DEBUGGER CATCHER
   ========================================================= */
var map;
try {
  if (typeof L === 'undefined') {
    throw new Error('Biblioteca Leaflet (L) não foi carregada pelo navegador da TV (Erro de CDN/SSL).');
  }
  map = L.map('map', { center:CENTER, zoom:ZOOM, zoomControl:true, attributionControl:true });
  // Usa o esquema protocol-relative (//) para as Smart TVs antigas superarem bloqueios de Handshake SSL e baixarem os basemaps nativamente
  L.tileLayer('//{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy;<a href="https://carto.com/">CARTO</a> &copy;<a href="https://osm.org/copyright">OSM</a>',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);
  map.zoomControl.setPosition('bottomleft');
} catch (mapErr) {
  console.error('[Radar] Fatal Map Error:', mapErr);
  var errBox = document.createElement('div');
  errBox.style.cssText = 'position:fixed;inset:0;background:#110000;color:#ff4060;z-index:999999;padding:40px;font-size:24px;font-family:monospace;overflow:auto;';
  errBox.innerHTML = '<h2>🚨 ERRO FATAL NA SMART TV LG</h2><br><p><b>Detalhes do Erro:</b> ' + mapErr.message + '</p><br><p><b>Stack:</b> ' + (mapErr.stack || 'N/A') + '</p><br><p><b>UserAgent:</b> ' + navigator.userAgent + '</p><br><p>Informe este erro ao suporte para calibração definitiva!</p>';
  document.body.appendChild(errBox);
  return; // Interrompe o script mantendo o depurador na tela da TV
}

L.rectangle([[BBOX.lamin,BBOX.lomin],[BBOX.lamax,BBOX.lomax]], {
  color:'rgba(0,212,255,.18)', weight:1, fill:false, dashArray:'10 7'
}).addTo(map);

/* Permanent City & Airport Markers */
var CITIES = [
  { name: 'São João del-Rei', lat: -21.135, lng: -44.261 },
  { name: 'Pirassununga',     lat: -21.996, lng: -47.426 },
  { name: 'Tietê',            lat: -23.106, lng: -47.716 }
];
CITIES.forEach(function(c) {
  L.circleMarker([c.lat, c.lng], {
    radius: 2, fillColor: '#607080', fillOpacity: 0.85, weight: 0
  }).addTo(map).bindTooltip(c.name, {
    permanent: true, direction: 'top', className: 'city-label', offset: [0, -2]
  });
});

var AIRPORTS = [
  { name: 'SBGR', lat: -23.4356, lng: -46.4731 }, // Guarulhos
  { name: 'SBMT', lat: -23.5091, lng: -46.6336 }, // Campo de Marte
  { name: 'SBSP', lat: -23.6261, lng: -46.6564 }, // Congonhas
  { name: 'SBKP', lat: -23.0069, lng: -47.1344 }, // Viracopos
  { name: 'SBGL', lat: -22.8090, lng: -43.2506 }, // Galeão
  { name: 'SBRJ', lat: -22.9105, lng: -43.1631 }, // Santos Dumont
  { name: 'SBCF', lat: -19.6336, lng: -43.9689 }, // Confins
  { name: 'SBBR', lat: -15.8692, lng: -47.9172 }, // Brasília
  { name: 'SBSV', lat: -12.9111, lng: -38.3317 }, // Salvador
  { name: 'SBRF', lat: -8.1264,  lng: -34.9230 }, // Recife
  { name: 'SBFZ', lat: -3.7761,  lng: -38.5322 }, // Fortaleza
  { name: 'SBPA', lat: -29.9939, lng: -51.1711 }, // Porto Alegre
  { name: 'SBCT', lat: -25.5317, lng: -49.1758 }, // Curitiba
  { name: 'SBFL', lat: -27.6703, lng: -48.5525 }, // Florianópolis
  { name: 'SBVT', lat: -20.2578, lng: -40.2864 }, // Vitória
  { name: 'SBGO', lat: -16.6325, lng: -49.2214 }, // Goiânia
  { name: 'SBCY', lat: -15.6528, lng: -56.1167 }, // Cuiabá
  { name: 'SBCG', lat: -20.4687, lng: -54.6725 }, // Campo Grande
  { name: 'SBEG', lat: -3.0361,  lng: -60.0497 }, // Manaus
  { name: 'SBBE', lat: -1.3792,  lng: -48.4761 }, // Belém
  { name: 'SBSL', lat: -2.5869,  lng: -44.2361 }, // São Luís
  { name: 'SBMO', lat: -9.5108,  lng: -35.7917 }, // Maceió
  { name: 'SBNT', lat: -5.7689,  lng: -35.3664 }, // Natal
  { name: 'SBPV', lat: -8.7136,  lng: -63.9022 }, // Porto Velho
  { name: 'SBRB', lat: -9.8689,  lng: -67.8981 }, // Rio Branco
  { name: 'SBMQ', lat: 0.0506,   lng: -51.0722 }, // Macapá
  { name: 'SBBV', lat: 2.8464,   lng: -60.6922 }, // Boa Vista
  { name: 'SBPS', lat: -16.4389, lng: -39.0806 }, // Porto Seguro
  { name: 'SBFI', lat: -25.5956, lng: -54.5889 }, // Foz do Iguaçu
  { name: 'SBYS', lat: -21.9842, lng: -47.3389 }  // AFA (Pirassununga)
];
AIRPORTS.forEach(function(a) {
  L.circleMarker([a.lat, a.lng], {
    radius: 2, fillColor: '#506575', fillOpacity: 0.85, weight: 0
  }).addTo(map).bindTooltip(a.name, {
    permanent: true, direction: 'top', className: 'airport-label', offset: [0, -2]
  });
});

/* =========================================================
   STATE
   ========================================================= */
var markers    = {};  // icao24 -> { marker, data }
var posHist    = {};  // icao24 -> [{lat,lng}]
var trackLines = {};  // icao24 -> L.polyline

var cdVal = FETCH_MS / 1000;

/* =========================================================
   AIRCRAFT CATEGORIZATION
   ========================================================= */
var AIRLINE_RE = /^(GLO|AZU|TAM|ONE|LAN|GOL|AAL|UAL|DAL|BAW|KLM|AFR|LUF|IBE|TAP|SWA|JBU|ACA|QFA|SIA|CPA|ETH|UAE|QTR|THA|GAL|VRG|AVA|SVA|PAL|JAL|ANA|TUR|MAU|KAL|DLH|BAV|AEL|RYR|EZY|WZZ|VLG|VKG|ATW|PTB|MRS|GND|ABX|FDX|UPS|DHL|TPA|SYA|EIN)/;

function categorize(d) {
  var cs  = (d.callsign || '').trim().toUpperCase();
  var vel = d.velocity || 0;
  var alt = (d.geo_altitude != null ? d.geo_altitude : d.baro_altitude) || 0;
  if (!d.on_ground && vel < 35 && alt < 900)  return 'helicopter';
  if (!d.on_ground && vel < 18)                return 'helicopter';
  if (AIRLINE_RE.test(cs))                     return 'airliner';
  if (vel > 145 && alt > 5500)                 return 'airliner';
  return 'small';
}

function miniSvg(cat) {

  if (cat === 'airliner')   return miniSvgAirliner(c, dk);
  if (cat === 'helicopter') return miniSvgHelicopter(c, dk);
  return miniSvgSmall(c, dk);
}

/* =========================================================
   BUILD LEAFLET DIVICON
   ========================================================= */
function buildIcon(d, selected) {
  var cat = categorize(d);
  var hdg = (d.true_track != null && !isNaN(d.true_track)) ? d.true_track : 0;
  var c   = selected ? '#ffffff' : (CAT_C[cat]  || '#aaa');
  var dk  = selected ? '#cccccc' : (CAT_DK[cat] || '#777');
  var glowCol = selected ? 'rgba(255,255,255,.9)' : c.replace('#','rgba(') + ',.8)';
  // Fix rgba for hex colors
  var dropShadow;
  if (selected) {
    dropShadow = 'drop-shadow(0 0 8px rgba(255,255,255,.9))';
  } else if (cat === 'airliner') {
    dropShadow = 'drop-shadow(0 0 5px rgba(0,212,255,.8))';
  } else if (cat === 'helicopter') {
    dropShadow = 'drop-shadow(0 0 5px rgba(255,179,64,.8))';
  } else {
    dropShadow = 'drop-shadow(0 0 5px rgba(0,255,157,.8))';
  }

  var svgFn = cat === 'airliner' ? svgAirliner
            : cat === 'helicopter' ? svgHelicopter
            : svgSmall;
  var svg = svgFn(c, dk);

  var w = cat === 'small' ? 28 : 32;
  var html = '<div style="width:'+w+'px;height:32px;transform:rotate('+hdg+'deg);'
           + 'transform-origin:center;filter:'+dropShadow+'">' + svg + '</div>';

  return L.divIcon({
    className: '',
    html: html,
    iconSize:    [w, 32],
    iconAnchor:  [w/2, 16],
    popupAnchor: [0, -22],
    tooltipAnchor: [w/2+2, 0]
  });
}

/* =========================================================
   POPUP CONTENT
   ========================================================= */
function popupSvg(cat) {
  var c  = CAT_C[cat]  || '#aaa';
  var dk = CAT_DK[cat] || '#777';
  if (cat === 'airliner')   return '<div class="pu-icon">'+svgAirliner(c, dk)+'</div>';
  if (cat === 'helicopter') return '<div class="pu-icon">'+svgHelicopter(c, dk)+'</div>';
  return '<div class="pu-icon" style="width:28px">'+svgSmall(c, dk)+'</div>';
}

var CAT_LABEL = { airliner:'Aviação Comercial', helicopter:'Helicóptero', small:'Aviação Geral' };

function buildPopup(d) {
  var cat = categorize(d);
  var cs  = (d.callsign || d.icao24 || '?').trim();
  var alt = d.geo_altitude != null ? d.geo_altitude : d.baro_altitude;
  var altFt = alt != null ? Math.round(alt * 3.281).toLocaleString() + ' ft' : 'N/A';
  var altM  = alt != null ? Math.round(alt) + ' m' : 'N/A';
  var spdKm = d.velocity != null ? Math.round(d.velocity * 3.6) + ' km/h' : 'N/A';
  var spdKt = d.velocity != null ? Math.round(d.velocity * 1.94384) + ' kt' : 'N/A';
  var spdStr = d.velocity != null ? spdKt + ' / ' + spdKm : 'N/A';
  var hdg   = d.true_track != null ? Math.round(d.true_track) + '°' : 'N/A';
  var vr    = d.vertical_rate;
  var vrtStr = vr != null
    ? ((vr > 0.5 ? '&#8593; ' : vr < -0.5 ? '&#8595; ' : '&#8594; ') + Math.abs(Math.round(vr)) + ' m/s')
    : '—';
  var gnd = d.on_ground ? 'Em solo' : 'Em voo';

  return '<div class="pu">'
    + '<div class="pu-head">' + popupSvg(cat)
    + '<div><div class="pu-cs">' + cs + '</div>'
    + '<div class="pu-type">' + (CAT_LABEL[cat] || 'Aeronave') + '</div></div></div>'
    + row('Matrícula', d.origin_country || 'N/A', '')
    + row('Status',    gnd, 'a')
    + row('Altitude',  altFt + ' / ' + altM, 'g')
    + row('Velocidade',spdStr, '')
    + row('Rumo',      hdg, 'c')
    + row('Vert.',     vrtStr, '')
    + '</div>';
}

function row(k, v, cls) {
  return '<div class="pu-row"><span class="pu-k">' + k + '</span>'
       + '<span class="pu-v' + (cls ? ' '+cls : '') + '">' + v + '</span></div>';
}

function buildTooltip(d) {
  var cs  = (d.callsign || d.icao24 || '?').trim();
  var alt = d.geo_altitude != null ? d.geo_altitude : d.baro_altitude;
  var ft  = alt != null ? Math.round(alt * 3.281).toLocaleString() + 'ft' : '?';
  var spd = d.velocity != null ? Math.round(d.velocity * 3.6) + 'km/h' : '?';
  return cs + ' \u00b7 ' + ft + ' \u00b7 ' + spd;
}

/* =========================================================
   POSITION HISTORY & TRACKS
   ========================================================= */
function addHist(icao24, lat, lng) {
  if (!posHist[icao24]) posHist[icao24] = [];
  var h = posHist[icao24];
  var last = h[h.length - 1];
  if (last && Math.abs(last.lat - lat) < 0.0001 && Math.abs(last.lng - lng) < 0.0001) return;
  h.push({ lat:lat, lng:lng });
  if (h.length > MAX_HIST) h.shift();
}

function showTrack(icao24) {
  var h = posHist[icao24];
  if (!h || h.length < 2) return;
  var lls = h.map(function(p){ return [p.lat, p.lng]; });
  if (trackLines[icao24]) {
    trackLines[icao24].setLatLngs(lls);
  } else {
    trackLines[icao24] = L.polyline(lls, {
      color:'#00d4ff', weight:2.2, opacity:.72,
      dashArray:'9 6'
    }).addTo(map);
    // Bring track below markers
    trackLines[icao24].bringToBack();
  }
}

function hideTrack(icao24) {
  if (trackLines[icao24]) {
    map.removeLayer(trackLines[icao24]);
    delete trackLines[icao24];
  }
}

/* =========================================================
   AIRCRAFT SELECTION
   ========================================================= */
function selectAircraft(icao24, isAuto) {
  // Deselect previous
  if (selIcao && selIcao !== icao24) {
    var prev = markers[selIcao];
    if (prev) prev.marker.setIcon(buildIcon(prev.data, false));
    hideTrack(selIcao);
  }

  selIcao = icao24;
  var entry = markers[icao24];
  if (!entry) return;

  // Update icon to selected
  entry.marker.setIcon(buildIcon(entry.data, true));

  // Show trajectory
  showTrack(icao24);

  // Fly/pan to aircraft
  var latlng = entry.marker.getLatLng();
  map.panTo(latlng, { animate:true, duration:0.7 });

  // Open popup
  entry.marker.openPopup();

  // Update list
  renderList();

  if (!isAuto) {
    userInteracted();
  }
}

function userInteracted() {
  autoMode = false;
  updateAutoBadge();
  clearTimeout(autoResumeT);
  autoResumeT = setTimeout(function(){
    autoMode = true;
    updateAutoBadge();
    advanceCycle();
  }, 60000);
}

function deselect() {
  if (selIcao) {
    var prev = markers[selIcao];
    if (prev) prev.marker.setIcon(buildIcon(prev.data, false));
    hideTrack(selIcao);
    selIcao = null;
    map.closePopup();
    renderList();
  }
  userInteracted();
}

function updateAutoBadge() {
  var badge = document.getElementById('autobadge');
  var txt   = document.getElementById('autotxt');
  if (autoMode) {
    badge.classList.remove('paused');
    txt.textContent = 'Ciclo automático';
  } else {
    badge.classList.add('paused');
    txt.textContent = 'Modo manual';
  }
}

/* =========================================================
   AUTO-CYCLE
   ========================================================= */
function startCycle() {
  clearInterval(cycleProgT);
  cycleElapsed = 0;
  cycleProgT = setInterval(function() {
    if (!autoMode) { cycleElapsed = 0; setCycleBar(0); return; }
    cycleElapsed += 100;
    setCycleBar(cycleElapsed / CYCLE_MS);
    if (cycleElapsed >= CYCLE_MS) {
      cycleElapsed = 0;
      advanceCycle();
    }
  }, 100);
}

function setCycleBar(frac) {
  var bar = document.getElementById('cpbar');
  if (bar) {
    bar.style.transition = 'none';
    bar.style.transform  = 'scaleX(' + Math.min(1, frac) + ')';
  }
}

function getVisibleEntries() {
  var bounds = map.getBounds();
  var arr = [];
  for (var k in markers) {
    if (Object.prototype.hasOwnProperty.call(markers, k)) {
      if (bounds.contains(markers[k].marker.getLatLng())) {
        arr.push(markers[k]);
      }
    }
  }
  return arr;
}

function advanceCycle() {
  if (!autoMode) return;
  var vis = getVisibleEntries();
  if (vis.length === 0) return;
  var idx = -1;
  for (var i = 0; i < vis.length; i++) {
    if (vis[i].data.icao24 === selIcao) { idx = i; break; }
  }
  idx = (idx + 1) % vis.length;
  selectAircraft(vis[idx].data.icao24, true);
}

/* =========================================================
   AIRCRAFT LIST (visible only)
   ========================================================= */
function renderList() {
  var vis = getVisibleEntries()
    .map(function(e){ return e.data; })
    .sort(function(a, b){
      var aA = (a.geo_altitude != null ? a.geo_altitude : a.baro_altitude) || 0;
      var bA = (b.geo_altitude != null ? b.geo_altitude : b.baro_altitude) || 0;
      return bA - aA;
    });

  var cnt = vis.length;
  document.getElementById('ph-cnt').textContent = cnt;
  document.getElementById('v-vis').textContent  = cnt;

  var list = document.getElementById('aclist');
  if (!cnt) {
    list.innerHTML = '<div class="empty-s"><div class="em">&#128269;</div>Nenhuma aeronave<br>nesta área do mapa.</div>';
    return;
  }

  list.innerHTML = vis.map(function(d){
    var cat = categorize(d);
    var cs  = (d.callsign || d.icao24 || '?').trim();
    var alt = d.geo_altitude != null ? d.geo_altitude : d.baro_altitude;
    var ft  = alt != null ? Math.round(alt * 3.281).toLocaleString() + ' ft' : '—';
    var spd = d.velocity != null ? Math.round(d.velocity * 3.6) + ' km/h' : '—';
    var sel = d.icao24 === selIcao;
    return '<div class="aci' + (sel ? ' sel' : '') + '" onclick="window._sel(\'' + d.icao24 + '\')">'
      + '<div class="aci-iw">' + miniSvg(cat) + '</div>'
      + '<div class="aci-info">'
        + '<span class="aci-cs ' + cat + '">' + cs + '</span>'
        + '<span class="aci-sub">' + (d.origin_country || 'Desconhecido') + '</span>'
      + '</div>'
    + '</div>';
  }).join('');

  // Scroll selected item into view
  if (selIcao) {
    var selEl = list.querySelector('.sel');
    if (selEl) selEl.scrollIntoView({ block:'nearest', behavior:'smooth' });
  }
}

/* Exposed for onclick in list items */
window._sel = function(icao24) { selectAircraft(icao24, false); };

/* =========================================================
   SMART TV POLYFILLS (SUPORTE A NAVEGADORES LEGADOS)
   ========================================================= */
if (typeof Promise !== 'undefined' && !Promise.any) {
  Promise.any = function(promises) {
    return new Promise(function(resolve, reject) {
      var errors = [];
      var count = 0;
      promises.forEach(function(p) {
        Promise.resolve(p).then(resolve).catch(function(error) {
          errors.push(error);
          count++;
          if (count === promises.length) {
            reject(new Error('All promises were rejected'));
          }
        });
      });
    });
  };
}

function fetchWithTimeout(url, ms) {
  return new Promise(function(resolve, reject) {
    var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
    var signal = controller ? controller.signal : undefined;
    var timer = setTimeout(function() {
      if (controller) controller.abort();
      reject(new Error('Timeout'));
    }, ms);

    fetch(url, { signal: signal })
      .then(function(res) {
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        resolve(res);
      })
      .catch(function(err) {
        clearTimeout(timer);
        reject(err);
      });
  });
}

/* =========================================================
   FETCH FROM PROXY
   ========================================================= */
function fetchAircraft() {
  console.log('[Radar] Executando busca v3.7 (LG Smart TV Universal Mode)...');
  setStatus('loading', 'Atualizando...');
  var openskyUrl = 'https://opensky-network.org/api/states/all?lamin=' + BBOX.lamin + '&lomin=' + BBOX.lomin + '&lamax=' + BBOX.lamax + '&lomax=' + BBOX.lomax;
  var adsbLolUrl = 'https://api.adsb.lol/v2/lat/-14/lon/-53/dist/2000'; // Raio de 2000 NM (cobre todo o Brasil)

  var reqs = [
    { type: 'adsblol',       url: 'https://radar-aereo-okfly.onrender.com/api/adsblol' }, // 1. Nosso proxy Render com Cache (1ms, infalível)
    { type: 'jsonp_adsblol', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(adsbLolUrl) }, // 2. Tenta via AllOrigins /get wrapper
    { type: 'adsblol',       url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(adsbLolUrl) }, // 3. Tenta via AllOrigins raw
    { type: 'adsblol',       url: 'https://corsproxy.io/?' + encodeURIComponent(adsbLolUrl) }, // 4. Tenta via corsproxy
    { type: 'adsblol',       url: adsbLolUrl }, // 5. Tenta direto
    { type: 'raw',           url: 'https://corsproxy.io/?' + encodeURIComponent(openskyUrl) },
    { type: 'jsonp',         url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(openskyUrl) },
    { type: 'raw',           url: openskyUrl },
    { type: 'raw',           url: 'https://radar-aereo-okfly.onrender.com/api/opensky?lamin=' + BBOX.lamin + '&lomin=' + BBOX.lomin + '&lamax=' + BBOX.lamax + '&lomax=' + BBOX.lomax }
  ];

  // Dispara as requisicoes em paralelo usando Promise vanilla sem async/await para suporte em Smart TV LG WebOS
  var promises = reqs.map(function(item) {
    return fetchWithTimeout(item.url, 15000).then(function(r) {
      return r.json();
    }).then(function(j) {
      if ((item.type === 'jsonp' || item.type === 'jsonp_adsblol') && j.contents) {
        j = JSON.parse(j.contents);
      }
      if (item.type === 'adsblol' || item.type === 'jsonp_adsblol') {
        if (!j || !j.ac) throw new Error('Invalid ADSB.lol structure');
        console.log('[Radar] SUCESSO VITÓRIA com ADSB.lol via:', item.url);
        return { type: 'adsblol', list: j.ac };
      } else {
        if (!j || j.error || !j.states) throw new Error('Invalid OpenSky structure');
        console.log('[Radar] SUCESSO VITÓRIA com OpenSky via:', item.url);
        return { type: 'opensky', list: j.states };
      }
    });
  });

  Promise.any(promises).then(function(data) {
    var parsed = [];
    var cur = {}; // Usa Object simples ES5 no lugar de Set!
    var curSize = 0;

    if (data.type === 'adsblol') {
      parsed = data.list.map(function(s) {
        var callsign = (s.flight || '').trim() || s.r || s.hex;
        var info = (s.r || 'N/A') + (s.t ? ' (' + s.t + ')' : '');
        return {
          icao24:         s.hex,
          callsign:       callsign,
          origin_country: info, // Exibe Matrícula (Modelo)
          longitude:      s.lon,
          latitude:       s.lat,
          baro_altitude:  s.alt_baro != null ? (s.alt_baro / 3.281) : null,
          on_ground:      s.alt_baro == null || s.alt_baro <= 0,
          velocity:       s.gs != null ? (s.gs * 1.852 / 3.6) : null,
          true_track:     s.track,
          vertical_rate:  s.baro_rate != null ? (s.baro_rate / 196.85) : null,
          geo_altitude:   s.alt_geom != null ? (s.alt_geom / 3.281) : null
        };
      }).filter(function(d){ return d.latitude != null && d.longitude != null; });
    } else {
      parsed = data.list.map(function(s){
        return {
          icao24:         s[0],
          callsign:       (s[1] || '').trim() || s[0],
          origin_country: s[2],
          longitude:      s[5],
          latitude:       s[6],
          baro_altitude:  s[7],
          on_ground:      s[8],
          velocity:       s[9],
          true_track:     s[10],
          vertical_rate:  s[11],
          geo_altitude:   s[13]
        };
      }).filter(function(d){ return d.latitude != null && d.longitude != null; });
    }

    parsed.forEach(function(d) {
      var id = d.icao24;
      if (!cur[id]) { cur[id] = true; curSize++; }
      addHist(id, d.latitude, d.longitude);

      // Refresh track if selected
      if (id === selIcao) showTrack(id);

      var latlng = [d.latitude, d.longitude];
      var icon   = buildIcon(d, id === selIcao);

      if (markers[id]) {
        var e = markers[id];
        e.data = d;
        // Apenas processa se for um dado novo da API (ignora repeticoes de cache)
        if (d.latitude !== e.apiLat || d.longitude !== e.apiLng) {
          e.apiLat = d.latitude;
          e.apiLng = d.longitude;
          e.lastUpdate = Date.now();
          // Substitui Math.hypot por Math.sqrt pitagórico clássico ES5
          var dLat = e.currentLat - d.latitude;
          var dLng = e.currentLng - d.longitude;
          var distDiff = Math.sqrt(dLat * dLat + dLng * dLng) * 111132;
          if (d.on_ground || distDiff > 600) {
            e.currentLat = d.latitude;
            e.currentLng = d.longitude;
            e.marker.setLatLng(latlng);
          } else {
            // Suavizacao espetacular (Filtro Kalman simplificado): mescla a nova posicao sem saltos brutos
            e.currentLat = (e.currentLat * 0.75) + (d.latitude * 0.25);
            e.currentLng = (e.currentLng * 0.75) + (d.longitude * 0.25);
          }
        }
        e.marker.setIcon(icon);
        e.marker.setPopupContent(buildPopup(d));
        e.marker.setTooltipContent(buildTooltip(d));
      } else {
        var mk = L.marker(latlng, { icon:icon }).addTo(map)
          .bindPopup(buildPopup(d), { maxWidth:258 })
          .bindTooltip(buildTooltip(d), { direction:'right', opacity:1 });

        // Remove Leaflet's default popup-on-click so we control it
        mk.off('click');
        mk.on('click', (function(icao24) {
          return function(e) {
            L.DomEvent.stopPropagation(e);
            selectAircraft(icao24, false);
          };
        })(id));

        markers[id] = {
          marker: mk,
          data: d,
          lastUpdate: Date.now(),
          apiLat: d.latitude,
          apiLng: d.longitude,
          currentLat: d.latitude,
          currentLng: d.longitude
        };
      }
    });

    // Remove aircraft no longer in data
    for (var mId in markers) {
      if (Object.prototype.hasOwnProperty.call(markers, mId)) {
        if (!cur[mId]) {
          map.removeLayer(markers[mId].marker);
          delete markers[mId];
          hideTrack(mId);
          if (posHist[mId]) delete posHist[mId];
          if (mId === selIcao) { selIcao = null; map.closePopup(); }
        }
      }
    }

    var total = curSize;
    document.getElementById('v-total').textContent = total;
    setStatus('ok', total + ' aeronaves');
    renderList();
    flashScan();
    resetCountdown();

  }).catch(function(err) {
    console.warn('[Radar] fetch error:', err);
    setStatus('error', 'Sem dados — retentando...');
    resetCountdown();
    // Exibe o depurador visual de rede na barra lateral da TV LG para entendermos por que as requisições falham
    var listEl = document.getElementById('alist');
    if (listEl) {
      listEl.innerHTML = '<div style="padding:15px;color:#ff4060;font-family:monospace;font-size:12px;line-height:1.4;">'
        + '<b>🚨 TV Network Blocked:</b><br>' + err.message + '<br>'
        + '<b>Causa:</b> Handshake SSL ou regra CORS legada impedindo o fetch.<br>'
        + '<b>UserAgent:</b> ' + navigator.userAgent + '</div>';
    }
  });
}

/* =========================================================
   DEAD RECKONING (FLIGHTRADAR24 SMOOTH ANIMATION)
   ========================================================= */
function animateAircraft() {
  var now = Date.now();
  for (var k in markers) {
    if (!Object.prototype.hasOwnProperty.call(markers, k)) continue;
    var e = markers[k];
    var d = e.data;
    if (d.on_ground || d.velocity == null || d.true_track == null || d.velocity <= 0) continue;
    
    // Se o avião não recebe dados reais há mais de 60 segundos, cessa a animação
    if (now - e.lastUpdate > 60000) continue;

    var dt = 0.2; // 200ms em segundos
    var dist = d.velocity * dt; // Metros percorridos neste frame
    var rad = d.true_track * Math.PI / 180;
    var dLat = (dist * Math.cos(rad)) / 111132;
    var dLng = (dist * Math.sin(rad)) / (111132 * Math.cos(e.currentLat * Math.PI / 180));

    e.currentLat += dLat;
    e.currentLng += dLng;
    e.marker.setLatLng([e.currentLat, e.currentLng]);
  }
}

/* =========================================================
   HELPERS
   ========================================================= */
function setStatus(type, txt) {
  document.getElementById('sdot').className = 'dot ' + (type === 'ok' ? '' : type);
  document.getElementById('stxt').textContent = txt;
}

function flashScan() {
  var r = document.getElementById('scanring');
  var el = document.createElement('div');
  el.style.cssText = 'position:absolute;inset:0;pointer-events:none;'
    + 'background:radial-gradient(ellipse at center,rgba(0,212,255,.055) 0%,transparent 68%);';
  el.classList.add('scan-flash');
  r.appendChild(el);
  setTimeout(function(){ el.remove(); }, 900);
}

function resetCountdown() {
  cdVal = FETCH_MS / 1000;
  clearInterval(cdTimer);
  cdTimer = setInterval(function(){
    cdVal--;
    var el = document.getElementById('cd');
    if (el) el.textContent = Math.max(0, cdVal);
    if (cdVal <= 0) clearInterval(cdTimer);
  }, 1000);
}

function pad2(val) {
  var s = String(val);
  return s.length < 2 ? '0' + s : s;
}

function updateClock() {
  var n = new Date();
  var h = pad2(n.getHours());
  var m = pad2(n.getMinutes());
  var s = pad2(n.getSeconds());
  var el = document.getElementById('clock');
  if (el) el.textContent = h + ':' + m + ':' + s;
}

/* =========================================================
   MAP EVENTS & INTERACTION LIFECYCLE
   ========================================================= */
map.on('moveend zoomend', function() {
  // Se o usuario arrasta o mapa para outro lugar e o aviao selecionado sai da tela, solta automaticamente!
  if (selIcao && markers[selIcao]) {
    var bounds = map.getBounds();
    var latlng = markers[selIcao].marker.getLatLng();
    if (!bounds.contains(latlng)) {
      var prev = markers[selIcao];
      prev.marker.setIcon(buildIcon(prev.data, false));
      hideTrack(selIcao);
      selIcao = null;
      map.closePopup();
    }
  }
  checkWeatherLayer();
  renderList();
});

// Ao arrastar ou dar zoom no mapa, reseta o cronometro de 60 segundos de inatividade
map.on('dragstart zoomstart', function() { userInteracted(); });

// Click on empty map -> deselect & reset timer
map.on('click', function() { deselect(); });

/* =========================================================
   WEATHER RADAR (REDEMET / RAINVIEWER API)
   ========================================================= */
var weatherLayer = null;

function checkWeatherLayer() {
  if (!weatherLayer) return;
  var z = map.getZoom();
  // Se o zoom for maior que 6 (a partir do 4º clique na Smart TV / Widescreen), remove a camada meteorologica do DOM
  if (z > 6) {
    if (map.hasLayer(weatherLayer)) map.removeLayer(weatherLayer);
  } else {
    if (!map.hasLayer(weatherLayer)) map.addLayer(weatherLayer);
  }
}

function initWeatherLayer() {
  console.log('[Radar] Buscando dados de radar meteorologico (REDEMET / RainViewer)...');
  fetchWithTimeout('https://api.rainviewer.com/public/weather-maps.json', 10000).then(function(res) {
    return res.json();
  }).then(function(data) {
    if (data && data.radar && data.radar.past && data.radar.past.length > 0) {
      // Pega o timestamp mais recente (o ultimo da lista)
      var last = data.radar.past[data.radar.past.length - 1];
      // Esquema de cores 2: REDEMET / Classic Color Weather Radar (Verde, Amarelo, Vermelho, Roxo)
      var tileUrl = data.host + last.path + '/512/{z}/{x}/{y}/2/1_1.png';
      console.log('[Radar] Camada meteorologica carregada:', tileUrl);
      if (weatherLayer && map.hasLayer(weatherLayer)) map.removeLayer(weatherLayer);
      weatherLayer = L.tileLayer(tileUrl, {
        opacity: 0.55, // Transparencia elegante de 55% para nao ofuscar as aeronaves
        maxNativeZoom: 6, // Evita requisicoes sem cobertura
        maxZoom: 6,       // Esconde a camada apos o 4º clique (Zoom > 6)
        attribution: '&copy; RainViewer / REDEMET'
      });
      checkWeatherLayer();
    }
  }).catch(function(e) {
    console.warn('[Radar] Erro ao carregar meteorologia:', e);
  });
}

/* =========================================================
   BOOT
   ========================================================= */
setInterval(updateClock, 1000);
updateClock();
initWeatherLayer();
setInterval(initWeatherLayer, 300000); // Atualiza meteorologia a cada 5 minutos
fetchAircraft();
setInterval(fetchAircraft, FETCH_MS);
setInterval(animateAircraft, 200);
startCycle();

})();
</script>
